<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOB — Sphère WebGL Interactive</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }
        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        .overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            font-size: 14px;
            opacity: 0.8;
            pointer-events: none;
        }
        h1 {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 2rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            font-weight: 300;
            letter-spacing: 4px;
        }
        .explosion {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,0,0.8) 0%, rgba(255,200,0,0.4) 30%, rgba(255,100,0,0.2) 60%, transparent 100%);
            pointer-events: none;
            animation: fade 1s forwards;
        }
        @keyframes fade {
            to { opacity: 0; transform: scale(0); }
        }
    </style>
</head>
<body>
    <h1>✨ BOB ✨</h1>
    <div id="canvas"></div>
    <div class="overlay">Sphère 3D WebGL — Three.js — Déplace ta souris !</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- Configuration ---
        const CONFIG = {
            particleCount: 400,
            sphereRadius: 5,
            subdivision: 24,
            particleSpeed: 0.03,
            repulsionForce: 15,
            explosionCount: 12,
            explosionSpeed: 0.15,
            explosionSize: 30,
        };

        // --- Scène, caméra, rendu ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas').appendChild(renderer.domElement);

        // --- Sphères ---
        const geometry = new THREE.IcosahedronGeometry(CONFIG.sphereRadius, CONFIG.subdivision);
        const material = new THREE.MeshBasicMaterial({
            color: 0x00ffff,
            wireframe: true,
            transparent: true,
            opacity: 0.8
        });
        const sphere = new THREE.Mesh(geometry, material);
        scene.add(sphere);

        const innerGeometry = new THREE.SphereGeometry(CONFIG.sphereRadius - 0.8, 32, 16);
        const innerMaterial = new THREE.MeshBasicMaterial({
            color: 0x0088ff,
            wireframe: false,
            transparent: true,
            opacity: 0.25
        });
        const innerSphere = new THREE.Mesh(innerGeometry, innerMaterial);
        scene.add(innerSphere);

        // --- Système de particules interactifs ---
        class Particle {
            constructor() {
                this.position = new THREE.Vector3();
                this.velocity = new THREE.Vector3();
                this.radius = Math.random() * 0.15 + 0.1;
                this.color = new THREE.Color();
                this.color.setHSL(Math.random() * 0.2 + 0.4, 0.9, 0.6);
                this.baseColor = this.color.clone();
                this.age = 0;
                this.dead = false;
            }

            respawn() {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(Math.random() * 2 - 1);
                const r = CONFIG.sphereRadius + 0.5 + Math.random() * 1.5;
                this.position.setFromSphericalCoords(r, phi, theta);
                this.velocity.set(0, 0, 0);
                this.age = 0;
                this.dead = false;
                this.color.copy(this.baseColor);
            }

            explode(explosionPos, force) {
                const dir = new THREE.Vector3().subVectors(explosionPos, this.position).normalize();
                this.velocity.add(dir.multiplyScalar(force * CONFIG.repulsionForce));
            }

            update() {
                this.position.add(this.velocity.multiplyScalar(CONFIG.particleSpeed));
                this.age++;

                // Collision avec la surface de la sphère
                const dist = this.position.length() - CONFIG.sphereRadius;
                if (dist < 0.5) {
                    const normal = new THREE.Vector3().normalize();
                    this.velocity.reflect(normal.multiplyScalar(0.5));
                }

                // Si la particule s'éloigne trop, la recycler
                if (this.position.distanceTo(this.position.clone().divideScalar(0).add(CONFIG.sphereRadius * new THREE.Vector3(1,1,1))) > 20) {
                    this.respawn();
                }
            }

            render(context) {
                const x = this.position.x + sphere.position.x;
                const y = this.position.y + sphere.position.y;
                const z = this.position.z + sphere.position.z;
                context.beginPath();
                context.arc(x, y, this.radius, 0, Math.PI * 2);
                context.fillStyle = this.color.getStyle();
                context.fill();
            }
        }

        const particles = [];
        for (let i = 0; i < CONFIG.particleCount; i++) {
            const p = new Particle();
            p.respawn();
            particles.push(p);
        }

        // --- Système d'explosion ---
        const explosions = [];
        class Explosion {
            constructor(x, y, z) {
                this.position = new THREE.Vector3(x, y, z);
                this.radius = CONFIG.explosionSize;
                this.maxRadius = this.radius;
                this.growth = 0;
                this.age = 0;
                this.life = 0.8 + Math.random() * 0.4;
            }

            update() {
                this.growth += CONFIG.explosionSpeed;
                this.age += CONFIG.particleSpeed * 3;
                if (this.growth >= this.maxRadius) {
                    this.life -= this.age;
                }
                if (this.life <= 0) {
                    return true; // mort
                }
                return false;
            }

            render(context) {
                const x = this.position.x + sphere.position.x;
                const y = this.position.y + sphere.position.y;
                const z = this.position.z + sphere.position.z;
                context.beginPath();
                context.arc(x, y, this.radius * this.growth / this.maxRadius, 0, Math.PI * 2);
                context.strokeStyle = `rgba(255, 200, 0, ${this.life})`;
                context.lineWidth = 2;
                context.stroke();
            }
        }

        // --- Collision detection ---
        function checkCollisions() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const p1 = particles[i];
                    const p2 = particles[j];
                    const distSq = p1.position.distanceToSquared(p2.position);
                    if (distSq < (p1.radius + p2.radius) ** 2) {
                        // Explosion
                        explosions.push(new Explosion(
                            p1.position.x + sphere.position.x,
                            p1.position.y + sphere.position.y,
                            p1.position.z + sphere.position.z
                        ));
                        // Rebond
                        const normal = new THREE.Vector3().subVectors(p2.position, p1.position).normalize();
                        p1.velocity.sub(normal.multiplyScalar(CONFIG.repulsionForce));
                        p2.velocity.add(normal.multiplyScalar(CONFIG.repulsionForce));
                    }
                }
            }

            // Collisions avec la sphère
            for (const p of particles) {
                const dist = p.position.length();
                if (dist < CONFIG.sphereRadius + 1) {
                    const normal = p.position.clone().normalize();
                    p.velocity.sub(normal.multiplyScalar(5));
                }
            }
        }

        // --- Mouse interaction ---
        const mouse = new THREE.Vector3();
        const mouseRaycaster = new THREE.Raycaster();
        let mouseActive = false;

        renderer.domElement.addEventListener('mousemove', (e) => {
            const rect = renderer.domElement.getBoundingClientRect();
            const mx = (e.clientX - rect.left) / rect.width;
            const my = 1 - (e.clientY - rect.top) / rect.height;
            mouse.x = mx * 2 - 1;
            mouse.y = -my * 2 + 1;
            mouseActive = true;
        });

        // --- Lumières ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        // --- Animation ---
        function animate() {
            requestAnimationFrame(animate);

            // Rotation des sphères
            sphere.rotation.y += 0.003;
            sphere.rotation.x += 0.002;
            innerSphere.rotation.y -= 0.005;
            innerSphere.rotation.x -= 0.002;

            // Mouvement des particules
            for (const p of particles) {
                p.update();
            }

            // Collisions
            checkCollisions();

            // Explosions
            for (let i = explosions.length - 1; i >= 0; i--) {
                if (explosions[i].update()) {
                    explosions.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        // Lancer l'animation
        animate();

        // --- Responsive ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        console.log('BOB Sphere WebGL Ready!');
    </script>
</body>
</html>
